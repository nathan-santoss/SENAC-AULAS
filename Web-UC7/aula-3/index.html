<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <title>Salvador - Contato</title>
</head>
<body style="font-family: verdana;">
    <h1>Descubra Salvador</h1>
    <hr>
    <fieldset>
        <legend>Fale Conosco (Dúvidas/Sugestões)</legend>
        <form action="#" method="post">
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required><br><br>

            <label for="tel">Telefone:</label><br>
            <input type="tel" id="tel" name="tel" placeholder="55 (71) 99999-9999"><br><br>

            <label for="assunto">Assunto:</label><br>
            <select id="assunto" name="assunto">
                <option>Informações Turísticas</option>
                <option>Eventos (Carnaval)</option>
                <option>Hospedagem</option>
                <option selected>Outros</option>
            </select><br><br>

            <label for="msg">Mensagem:</label><br>
            <textarea id="msg" name="message" rows="5" cols="30" placeholder="Digite aqui sua mensagem"></textarea><br><br>

            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
    </fieldset>
</body>
</html>
