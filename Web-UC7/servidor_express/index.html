<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 8px;
        }

        .titulo {
            margin-bottom: 10px;
        }

        .botao {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .botao:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <main class="container">
        <h1 class="titulo">Bem-vindo ao Site</h1>
        <p class="descricao">Clique abaixo para realizar seu cadastro</p>

        <a class="botao" href="/cadastro">Ir para Cadastro</a>
    </main>

</body>

</html>
