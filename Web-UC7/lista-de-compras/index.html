<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <script src="renderer.js" defer></script>
</head>
<body>
    <header>
        <h1>Lista de compras</h1>
    </header>
    <nav>
        <span>Produto: </span>
        <input type="text" id="nome-prod">
        <span>Categoria: </span>
        <select name="categorias" id="categoria">
            <option value="Limpeza">Limpeza</option>
            <option value="Frutas">Frutas</option>
            <option value="Mercearia">Mercearia</option>
            <option value="Congelados">Congelados</option>
        </select>
        <button id="botao-add">Adicionar</button>
    </nav>
    <div name= "lista" id="lista-compras">

        <ol id="lista-limpeza" style="display: none;">
            <div style="display: flex;"">
                <h1>🫧 Limpeza</h1>
                <p id="qtde"></p>
            </div>

        </ol>

        <ol id="lista-frutas" style="display: none;">
            <div style="display: flex;"">
                <h1>🍉 Frutas</h1>
                <p id="qtde"></p>
            </div>

        </ol>

        <ol id="lista-mercearia" style="display: none;">
            <div style="display: flex;"">
                <h1>🛒 Mercearia</h1>
                <p id ="qtde"></p>
            </div>

        </ol>

        <ol id="lista-congelados" style="display: none;">
            <div style="display: flex;"">
                <h1>🧊 Congelados</h1>
                <p id="qtde"></p>
            </div>

        </ol>

    </div>
</body>
</html>
