<!DOCTYPE html>
<html>

<head>
    <title>Músicas da Bahia</title>
    <meta charset="UTF-8">
    <style>
        .corpo-musicas {
            background-color: #fce4ec;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .titulo-musicas {
            color: #ad1457;
            text-align: center;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .paragrafo-musicas {
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #4a148c;
            margin-bottom: 25px;
        }

        .lista-artistas {
            width: 350px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border: 2px solid #ad1457;
            border-radius: 10px;
        }

        .item-artista {
            font-size: 1.1rem;
            color: #ad1457;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .link-retorno {
            color: #ad1457;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>

<body class="corpo-musicas">
    <h1 class="titulo-musicas">Música Baiana</h1>
    <p class="paragrafo-musicas">
        A Bahia é conhecida por sua forte tradição musical.
        Diversos artistas famosos nasceram ou começaram sua carreira em Salvador.
    </p>
    <ul class="lista-artistas">
        <li class="item-artista">Banda Eva</li>
        <li class="item-artista">Ivete Sangalo</li>
        <li class="item-artista">Olodum</li>
        <li class="item-artista">Chiclete com Banana</li>
    </ul>
    <a class="link-retorno" href="index.html">Voltar</a>
</body>

</html>
