<!DOCTYPE html>
<html>

<head>

<title>Contato</title>

<meta charset="UTF-8">

</head>

<body>

<h1>Entre em Contato</h1>

<form>

<fieldset>

<legend>Formulário de Contato</legend>

<label for="nome">Nome:</label><br>
<input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" name="email" placeholder="Digite seu email" required><br><br>

<label for="telefone">Telefone:</label><br>
<input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone"><br><br>

<label for="assunto">Assunto:</label><br>
<input type="text" id="assunto" name="assunto"><br><br>

<label for="mensagem">Mensagem:</label><br>

<textarea id="mensagem" rows="4" cols="40"
placeholder="Digite sua mensagem"></textarea>

<br><br>

<input type="submit" value="Enviar">

<input type="reset" value="Limpar">

</fieldset>

</form>

<br>

<a href="index.html">Voltar</a>

</body>

</html>
