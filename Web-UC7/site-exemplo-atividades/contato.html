<!DOCTYPE html>
<html>

<head>
    <title>Contato</title>
    <meta charset="UTF-8">
    <style>
        .corpo-contato {
            background-color: #e0f2f1;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .titulo-contato {
            color: #004d40;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .caixa-formulario {
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #b2dfdb;
            width: 450px;
            margin: 0 auto;
        }

        .grupo-campos {
            border: 2px solid #004d40;
            border-radius: 8px;
            padding: 20px;
        }

        .titulo-grupo {
            font-weight: bold;
            color: #004d40;
            padding: 5px;
        }

        .rotulo-entrada {
            font-weight: bold;
            color: #00695c;
            margin-bottom: 5px;
        }

        .campo-entrada {
            width: 400px;
            padding: 8px;
            border: 1px solid #80cbc4;
            border-radius: 4px;
            margin-bottom: 15px;
            outline-color: #004d40;
        }

        .area-mensagem {
            width: 400px;
            padding: 8px;
            border: 1px solid #80cbc4;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .botao-enviar {
            background-color: #00796b;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            margin-right: 10px;
        }

        .botao-limpar {
            background-color: #d32f2f;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        .link-retorno {
            color: #004d40;
            text-decoration: underline;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body class="corpo-contato">
    <h1 class="titulo-contato">Entre em Contato</h1>
    <form class="caixa-formulario">
        <fieldset class="grupo-campos">
            <legend class="titulo-grupo">Formulário de Contato</legend>
            <label class="rotulo-entrada" for="nome">Nome:</label><br>
            <input class="campo-entrada" type="text" id="nome" name="nome" placeholder="Digite seu nome"
                required><br><br>
            <label class="rotulo-entrada" for="email">Email:</label><br>
            <input class="campo-entrada" type="email" id="email" name="email" placeholder="Digite seu email"
                required><br><br>
            <label class="rotulo-entrada" for="telefone">Telefone:</label><br>
            <input class="campo-entrada" type="tel" id="telefone" name="telefone"
                placeholder="Digite seu telefone"><br><br>
            <label class="rotulo-entrada" for="assunto">Assunto:</label><br>
            <input class="campo-entrada" type="text" id="assunto" name="assunto"><br><br>
            <label class="rotulo-entrada" for="mensagem">Mensagem:</label><br>
            <textarea class="area-mensagem" id="mensagem" rows="4" cols="40"
                placeholder="Digite sua mensagem"></textarea>
            <br><br>
            <input class="botao-enviar" type="submit" value="Enviar">
            <input class="botao-limpar" type="reset" value="Limpar">
        </fieldset>
    </form>
    <br>
    <a class="link-retorno" href="index.html">Voltar</a>
</body>

</html>
