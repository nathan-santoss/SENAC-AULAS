<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inova Tech - Secretaria</title>
    <link rel="stylesheet" href="/secretaria/style.css">
    <script src="/secretaria/render.js" defer></script>
</head>

<body>
    <header class="cabecalho-principal">
        <a href="/">
            <img src="/logo-instituicao.jpg" alt="Inova Tech" class="logotipo-imagem">
        </a>
        <nav>
            <ul class="navegacao-lista">
                <li><a href="/" class="navegacao-item">Início</a></li>
                <li><a href="/curso/curso.html" class="navegacao-item">Cursos</a></li>
                <li><a href="/secretaria/secretaria.html" class="navegacao-item">Secretaria</a></li>
            </ul>
        </nav>
    </header>

    <main class="conteudo-principal">
        <section class="secao-destaque">
            <h2 class="titulo-secao">Novos Alunos</h2>
            <a href="/secretaria/cadastro/cadastro.html" class="botao-acao">Realizar Nova Matrícula</a>
        </section>

        <section class="secao-formulario">
            <h2 class="titulo-secao">Solicitações Acadêmicas</h2>
            <form id="formulario-solicitacao" action="#">
                <div class="grupo-campo">
                    <label for="nome-solicitante">Nome Completo:</label>
                    <input type="text" id="nome-solicitante" class="entrada-dado" placeholder="Seu nome aqui" required>
                </div>
                <div class="grupo-campo">
                    <label for="tipo-servico">Tipo de Serviço:</label>
                    <select id="tipo-servico" class="entrada-dado" required>
                        <option value="" disabled selected>Selecione um serviço</option>
                        <option value="declaracao">Declaração de Vínculo</option>
                        <option value="historico">Histórico Acadêmico</option>
                        <option value="trancamento">Trancamento de Matrícula</option>
                    </select>
                </div>
                <div class="grupo-campo">
                    <label for="detalhes-pedido">Detalhes da Solicitação:</label>
                    <textarea id="detalhes-pedido" class="entrada-dado" rows="4" required></textarea>
                </div>
                <button type="submit" class="botao-enviar">Enviar Requerimento</button>
            </form>
        </section>
    </main>

    <footer class="rodape-institucional">
        <p>© 2024 Inova Tech - Unidade Senac Zona Norte</p>
    </footer>
</body>

</html>
