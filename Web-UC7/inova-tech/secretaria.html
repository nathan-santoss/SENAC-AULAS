<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inova Tech - Secretaria</title>
    <style>
        :root {
            --primary: #004a8d;
            --secondary: #ff9900;
            --light: #f4f4f4;
            --white: #ffffff;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        *:is(h1, h2, h3, p, span, li, td)::selection {
            background-color: var(--secondary);
            color: var(--primary);
        }

        .cabecalho {
            background-color: var(--primary);
            color: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .nav-lista {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            flex: 1;
            width: 90%;
            max-width: 600px;
            margin: 2rem auto;
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .form-grupo {
            margin-bottom: 15px;
        }

        .form-grupo label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--primary);
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-enviar {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-enviar:hover {
            opacity: 0.9;
        }

        .rodape {
            background-color: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <header class="cabecalho">
        <div class="logo">Inova Tech</div>
        <nav>
            <ul class="nav-lista">
                <li><a href="index.html" class="nav-link">Início</a></li>
                <li><a href="cursos.html" class="nav-link">Cursos</a></li>
                <li><a href="secretaria.html" class="nav-link">Secretaria</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 2rem;">Secretaria Virtual</h2>
        <form action="#">
            <div class="form-grupo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" class="input-field" required>
            </div>
            <div class="form-grupo">
                <label for="matricula">Nº de Matrícula</label>
                <input type="text" id="matricula" class="input-field">
            </div>
            <div class="form-grupo">
                <label for="servico">Serviço Desejado</label>
                <select id="servico" class="input-field">
                    <option>Declaração de Matrícula</option>
                    <option>Histórico Escolar</option>
                    <option>Trancamento de Curso</option>
                </select>
            </div>
            <div class="form-grupo">
                <label for="msg">Observações</label>
                <textarea id="msg" class="input-field" rows="4"></textarea>
            </div>
            <button type="submit" class="btn-enviar">Enviar Solicitação</button>
        </form>
    </main>

    <footer class="rodape">
        <p>© 2024 Inova Tech - Atendimento ao Aluno</p>
    </footer>
</body>

</html>
