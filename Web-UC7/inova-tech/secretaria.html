<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inova Tech - Secretaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .cabecalho-principal {
            background-color: #004a8d;
            color: #ffffff;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logotipo-imagem {
            height: 60px;
            cursor: pointer;
        }

        .navegacao-lista {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .navegacao-item {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .navegacao-item:hover {
            color: #ff9900;
        }

        .container-formulario {
            flex: 1;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .titulo-formulario {
            color: #004a8d;
            text-align: center;
            margin-bottom: 25px;
        }

        .campo-grupo {
            margin-bottom: 20px;
        }

        .campo-grupo label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #004a8d;
        }

        .entrada-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #cccccc;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.3s;
        }

        .entrada-input:focus:invalid {
            border-color: #e74c3c;
        }

        .entrada-input:focus:valid {
            border-color: #2ecc71;
        }

        .botao-enviar {
            background-color: #ff9900;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .botao-enviar:hover {
            background-color: #004a8d;
        }

        .rodape-institucional {
            background-color: #004a8d;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <header class="cabecalho-principal">
        <a href="index.html">
            <img src="logo-instituicao.jpg" alt="Inova Tech" class="logotipo-imagem">
        </a>
        <nav>
            <ul class="navegacao-lista">
                <li><a href="index.html" class="navegacao-item">Início</a></li>
                <li><a href="curso.html" class="navegacao-item">Cursos</a></li>
                <li><a href="secretaria.html" class="navegacao-item">Secretaria</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-formulario">
        <h2 class="titulo-formulario">Solicitações Acadêmicas</h2>
        <form action="#">
            <div class="campo-grupo">
                <label>Nome Completo:</label>
                <input type="text" class="entrada-input" required>
            </div>
            <div class="campo-grupo">
                <label>Tipo de Serviço:</label>
                <select class="entrada-input" required>
                    <option value="" disabled selected>Selecione um serviço</option>
                    <option>Declaração de Vínculo</option>
                    <option>Histórico Acadêmico</option>
                    <option>Trancamento de Matrícula</option>
                </select>
            </div>
            <div class="campo-grupo">
                <label>Detalhes da Solicitação:</label>
                <textarea class="entrada-input" rows="4" required></textarea>
            </div>
            <button type="submit" class="botao-enviar">Enviar Requerimento</button>
        </form>
    </main>

    <footer class="rodape-institucional">
        <p>© 2024 Inova Tech - Atendimento ao Aluno</p>
    </footer>
</body>

</html>
