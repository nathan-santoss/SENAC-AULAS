<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .cabecalho {
            text-align: center;
            padding: 40px 20px;
        }

        .titulo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .cartao {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            width: 260px;
            text-align: center;
            transition: box-shadow 0.3s, background 0.3s;
        }

        .cartao:hover {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .titulo-cartao {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .botao {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s, box-shadow 0.3s;
        }

        .botao:hover {
            opacity: 0.85;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.6);
        }

        .rodape {
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>

</head>

<body>

    <header class="cabecalho">
        <h1 class="titulo">Meus Projetos</h1>
        <p class="subtitulo">Escolha um dos sistemas abaixo para acessar</p>
    </header>

    <main class="container">

        <div class="cartao">
            <h2 class="titulo-cartao">Turismo em Salvador</h2>
            <a href="./site-exemplo-atividades/index.html" class="botao">Acessar</a>
        </div>

        <div class="cartao">
            <h2 class="titulo-cartao">Inova Tech</h2>
            <a href="./inova-tech/index.html" class="botao">Acessar</a>
        </div>

    </main>
</body>

</html>
